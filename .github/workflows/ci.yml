name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:" # Use memory DB with async driver
          SECRET_KEY: "test_secret"
          ALGORITHM: "HS256"
          NOTIFICATION_SECRET: "test_notify"
          RESEND_API_KEY: "re_test"
          VAPID_PRIVATE_KEY: "test_pvt"
          VAPID_PUBLIC_KEY: "test_pub"
          VAPID_CLAIM_EMAIL: "test@example.com"
        run: |
          cd backend
          pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Run build
        run: |
          cd frontend
          npm run build
