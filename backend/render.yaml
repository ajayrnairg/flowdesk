services:
  - type: web
    name: flowdesk-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        sync: false
      - key: NOTIFICATION_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false
      - key: DIGEST_HOUR_UTC
        sync: false
      - key: DIGEST_WINDOW_MINUTES
        sync: false
